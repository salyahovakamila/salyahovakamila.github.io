on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-site
        cubes:
          - name: install-deps
            image: python:3.11-slim
            script:
              - pip install -r requirements.txt
          - name: build-site
            image: python:3.11-slim
            script:
              - mkdocs build
          - name: publish-site
            script:
              - git checkout -b release
              - git add site
              - "git commit -m 'feat: release'"
              - git push origin release -f