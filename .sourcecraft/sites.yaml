# Конфигурация публикации для MkDocs сайта
sites:
  - name: site1
    # Папка с готовым сайтом (собранным MkDocs)
    root: docs/
    # Команда сборки (пустая, т.к. собираем локально)
    build_command: ""
    # Ветка
    branch: main
    # Публикация
    publish:
      enabled: true
    # Индексный файл
    index: index.html