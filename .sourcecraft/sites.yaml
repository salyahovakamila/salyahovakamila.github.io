# Конфигурация публикации для MkDocs сайта
sites:
  - name: site1
    # Папка с готовым сайтом
    root: site/
    # Ветка
    branch: main
    # Команда сборки (пустая, т.к. собираем локально)
    build_command: pip install -r requirements.txt && mkdocs build
    # Публикация включена
    publish:
      enabled: true
    # Индексный файл
    index: index.html